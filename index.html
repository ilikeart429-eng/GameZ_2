<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZ_2</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
width:90%;
max-width:900px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

p{color:#aaa;}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:15px;
cursor:pointer;
transition:0.2s;
}

.card:hover{transform:scale(1.05);}

#adminBtn{
position:fixed;
top:10px;
right:10px;
background:#222;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
opacity:0.6;
}

#adminPanel{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:80%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="adminBtn" onclick="openAdmin()">Admin</div>

<div id="adminPanel">
  <div class="box">
    <h2>Developer Mode</h2>

    <input id="codeInput" placeholder="Enter code">

    <button onclick="checkCode()">Unlock</button>

    <p id="adminMsg"></p>

    <hr>

    <button onclick="setMood(100)">😊 Happy</button>
    <button onclick="setMood(0)">😐 Neutral</button>
    <button onclick="setMood(-100)">😡 Angry</button>

    <br><br>

    <button onclick="unlockAll()">Unlock All</button>
    <button onclick="closeAdmin()">Close</button>
  </div>
</div>

<div class="container">

<h1>GameZ_2</h1>
<p>Neal.fun-style mini games</p>

<div class="games">

<div class="card" onclick="openGame('button')">🎯 Button Game</div>
<div class="card" onclick="openGame('ai')">🤖 AI Game</div>
<div class="card" onclick="openGame('time')">🌌 Time Explorer</div>

</div>

</div>

<script>

let devMode = false;

function openGame(g){
if(g==="button") window.location.href="button.html";
if(g==="ai") window.location.href="ai.html";
if(g==="time") window.location.href="time.html";
}

// ADMIN
function openAdmin(){
document.getElementById("adminPanel").style.display="flex";
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

function checkCode(){
let code = document.getElementById("codeInput").value;

if(code==="quandel"){
devMode = true;
document.getElementById("adminMsg").innerText="DEV MODE ON";
}else{
document.getElementById("adminMsg").innerText="Wrong code";
}
}

function setMood(value){

if(!devMode){
alert("Locked");
return;
}

localStorage.setItem("aiMood", value);
alert("Mood set to " + value);
}

function unlockAll(){
if(!devMode){alert("Locked");return;}
alert("Everything unlocked (demo)");
}

</script>

</body>
</html>
