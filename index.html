<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameZ_2</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
width:90%;
max-width:900px;
}

h1{
font-size:70px;
margin-bottom:10px;
}

p{
color:#aaa;
margin-bottom:40px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
border:2px solid #2a2a2a;
}

.card:hover{
transform:translateY(-5px);
border-color:white;
}

.card h2{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>GameZ_2</h1>

<p>Neal.fun-style mini games</p>

<div class="games">

<div class="card" onclick="openGame('button')">
<h2>🎯 Don't Click The Button</h2>
<p>It gets worse every click.</p>
</div>

<div class="card" onclick="openGame('ai')">
<h2>🤖 Annoying AI</h2>
<p>It refuses to help you.</p>
</div>

<div class="card" onclick="openGame('time')">
<h2>🌌 Time Explorer</h2>
<p>Coming soon...</p>
</div>

</div>

</div>

<script>

function openGame(game){

if(game === "button"){
window.location.href = "button.html";
}

if(game === "ai"){
window.location.href = "ai.html";
}
  
if(game === "time"){
alert("Coming soon");
}

}

</script>

</body>
</html>
