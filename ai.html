<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neural AI Chat</title>

<style>

body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:900px;
}

h1{
text-align:center;
margin-bottom:10px;
}

#chat{
height:420px;
overflow-y:auto;
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#2a2a2a;
margin-left:auto;
text-align:right;
}

.ai{
background:#1a1a1a;
margin-right:auto;
color:#ddd;
}

.inputRow{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
background:#222;
color:white;
outline:none;
}

button{
padding:15px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:black;
font-weight:bold;
}

.stats{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 Real AI Chatbot</h1>

<div class="stats">
<div>Connected AI</div>
<div>Neural Engine Active</div>
</div>

<div id="chat"></div>

<div class="inputRow">
<input id="input" placeholder="Talk to the AI...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const chat = document.getElementById("chat");

// add message
function addMsg(text, type){

const div = document.createElement("div");
div.className = "msg " + type;
div.innerText = text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

// send message to API
async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMsg(text, "user");
input.value = "";

// loading indicator
addMsg("thinking...", "ai");

try {

const res = await fetch("https://chatbot-api.ilikeart429.workers.dev/", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
messages: [
{ role: "user", content: text }
]
})
});

const data = await res.json();

// remove "thinking..."
chat.removeChild(chat.lastChild);

// show AI response
addMsg(data.reply, "ai");

} catch (err) {

chat.removeChild(chat.lastChild);
addMsg("AI error: check connection", "ai");

}

}

// press Enter support
document.getElementById("input")
.addEventListener("keypress", function(e){
if(e.key === "Enter") send();
});

</script>

</body>
</html>
