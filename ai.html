<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neural AI</title>

<style>

body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:900px;
}

h1{
text-align:center;
margin-bottom:10px;
}

#chat{
height:420px;
overflow-y:auto;
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#2a2a2a;
margin-left:auto;
text-align:right;
}

.ai{
background:#1a1a1a;
margin-right:auto;
}

.inputRow{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
background:#222;
color:white;
}

button{
padding:15px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

.stats{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Neural AI</h1>

<div class="stats">
<div>Mood: <span id="mood">Neutral</span></div>
<div>Memory: <span id="memoryCount">0</span></div>
</div>

<div id="chat"></div>

<div class="inputRow">
<input id="input" placeholder="Talk to the AI...">
<button onclick="send()">Send</button>
</div>

</div>
