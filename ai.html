<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Game</title>

<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:800px;
}

#chat{
height:400px;
overflow-y:auto;
background:#151515;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:80%;
}

.user{background:#333;margin-left:auto;text-align:right;}
.ai{background:#1a1a1a;}

input{
width:75%;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="chat"></div>

<div class="row">
<input id="input" placeholder="Talk to AI...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const chat = document.getElementById("chat");

function add(text, cls){
const div = document.createElement("div");
div.className = "msg " + cls;
div.innerText = text;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

add(text,"user");
input.value = "";

// loading
add("thinking...","ai");

try{

const res = await fetch("https://chatbot-api.ilikeart429.workers.dev/", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
messages:[
{role:"user",content:text}
]
})
});

const data = await res.json();

chat.removeChild(chat.lastChild);

add(data.reply,"ai");

}catch(e){

chat.removeChild(chat.lastChild);
add("Error connecting AI","ai");

}

}

document.getElementById("input")
.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
