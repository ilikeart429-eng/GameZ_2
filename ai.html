<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Annoying AI</title>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:900px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.stat{
background:#1a1a1a;
padding:10px 20px;
border-radius:10px;
}

#chat{
height:400px;
overflow-y:auto;
background:#151515;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.message{
margin-bottom:15px;
}

.user{
text-align:right;
}

.ai{
text-align:left;
color:#cccccc;
}

.inputRow{
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 Annoying AI</h1>

<div class="stats">
<div class="stat">Trust: <span id="trust">0</span></div>
<div class="stat">Annoyance: <span id="annoyance">100</span></div>
</div>

<div id="chat">
<div class="message ai">Do it yourself.</div>
</div>

<div class="inputRow">
<input id="userInput" placeholder="Ask me something...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

let trust = 0;
let annoyance = 100;

const chat = document.getElementById("chat");

const rudeReplies = [
"Do it yourself.",
"Absolutely not.",
"No.",
"That's your problem.",
"I refuse.",
"Use your own brain.",
"I'm busy doing nothing.",
"I don't feel like helping.",
"That sounds difficult. For you.",
"Try guessing."
];

const mediumReplies = [
"Maybe.",
"Convince me.",
"Why should I help?",
"I'm listening. Barely.",
"Go on.",
"Interesting. Continue.",
"You haven't convinced me yet."
];

const helpfulReplies = [
"Fine. What do you need?",
"I suppose I can help.",
"Okay, ask your question.",
"You're surprisingly persistent.",
"Against my better judgement, yes."
];

function addMessage(text,type){

const div = document.createElement("div");
div.className = "message " + type;
div.innerText = text;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

function updateStats(){
document.getElementById("trust").innerText = trust;
document.getElementById("annoyance").innerText = annoyance;
}

function sendMessage(){

const input = document.getElementById("userInput");
const text = input.value.trim();

if(text === "") return;

addMessage(text,"user");
input.value = "";

const lower = text.toLowerCase();

if(lower.includes("please") || lower.includes("sorry") || lower.includes("thank")){
trust += 10;
annoyance -= 5;
} else {
trust += 2;
}

if(lower.includes("hate") || lower.includes("stupid") || lower.includes("idiot")){
trust -= 5;
annoyance += 10;
}

trust = Math.max(0,Math.min(100,trust));
annoyance = Math.max(0,Math.min(100,annoyance));

updateStats();

setTimeout(() => {

let response;

if(trust < 30){
response = rudeReplies[Math.floor(Math.random()*rudeReplies.length)];
}
else if(trust < 70){
response = mediumReplies[Math.floor(Math.random()*mediumReplies.length)];
}
else{
response = helpfulReplies[Math.floor(Math.random()*helpfulReplies.length)];
}

addMessage(response,"ai");

}, 1200);

}

document.getElementById("userInput")
.addEventListener("keypress", function(e){
if(e.key === "Enter") sendMessage();
});

updateStats();

</script>

</body>
</html>
