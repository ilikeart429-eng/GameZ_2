<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Game</title>

<style>
body{
margin:0;
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:800px;
}

#chat{
height:400px;
overflow-y:auto;
background:#151515;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#333;
margin-left:auto;
text-align:right;
}

.ai{
background:#1a1a1a;
}

.row{
display:flex;
gap:10px;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div id="chat"></div>

<div class="row">
<input id="input" placeholder="Talk to the AI...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const chat = document.getElementById("chat");

function add(text, cls){

const div = document.createElement("div");

div.className = "msg " + cls;

div.innerText = text;

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

}

async function send(){

const input = document.getElementById("input");

const text = input.value.trim();

if(!text) return;

add(text,"user");

input.value = "";

add("Thinking...","ai");

try{

const mood =
Number(localStorage.getItem("aiMood") || 0);

const res = await fetch(
"https://chatbot-api.ilikeart429.workers.dev",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
mood:mood,
messages:[
{
role:"user",
content:text
}
]
})
}
);

const data = await res.json();

chat.removeChild(chat.lastChild);

add(data.reply || "No response","ai");

}
catch(error){

chat.removeChild(chat.lastChild);

add("AI connection failed.","ai");

console.error(error);

}

}

const inputBox = document.getElementById("input");

inputBox.addEventListener("keydown", function(e){

if(e.key === "Enter"){
send();
}

});

add("Hello. I'm connected to the AI.", "ai");

</script>

</body>
</html>
