<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Explorer - Real Earth</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

#map{
height:100vh;
width:100%;
}

#panel{
position:fixed;
right:0;
top:0;
width:350px;
height:100%;
background:#111;
overflow:auto;
padding:15px;
display:none;
z-index:999;
}

#title{
font-size:22px;
margin-bottom:10px;
}

#img{
width:100%;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px;
margin-bottom:10px;
cursor:pointer;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
<button onclick="closePanel()">⬅ Close</button>
<div id="title"></div>
<div id="text"></div>
<img id="img">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🌍 INIT MAP
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 🌍 CLICK ANYWHERE
map.on('click', async function(e){

const lat = e.latlng.lat;
const lon = e.latlng.lng;

loadPlace(lat, lon);

});

// 🌍 REVERSE GEOCODING (GET COUNTRY/CITY)
async function loadPlace(lat, lon){

document.getElementById("panel").style.display="block";
document.getElementById("title").innerText="Loading...";
document.getElementById("text").innerText="";
document.getElementById("img").src="";

const geo = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await geo.json();

const name =
data.address.country ||
data.address.state ||
data.address.city ||
"Unknown";

document.getElementById("title").innerText = name;

// 🌍 Wikipedia data
const wiki = await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/" +
encodeURIComponent(name)
);

const w = await wiki.json();

document.getElementById("text").innerText =
w.extract || "No info found.";

if(w.thumbnail){
document.getElementById("img").src = w.thumbnail.source;
}

// smooth zoom
map.setView([lat, lon], 5, {animate:true});

}

// ❌ CLOSE PANEL
function closePanel(){
document.getElementById("panel").style.display="none";
}

</script>

</body>
</html>
