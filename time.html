<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Explorer</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer{
width:100%;
height:100%;
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
}

#panel{
position:absolute;
top:10px;
left:10px;
width:340px;
background:rgba(0,0,0,0.85);
color:white;
padding:15px;
border-radius:12px;
z-index:999;
}

#title{
font-size:22px;
margin-bottom:10px;
}

#yearInput{
width:100%;
padding:10px;
box-sizing:border-box;
border:none;
border-radius:8px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

#desc{
margin-top:10px;
line-height:1.4;
min-height:120px;
}
</style>

</head>

<body>

<div id="cesiumContainer"></div>

<div id="panel">

<div id="title">🌍 Time Explorer</div>

<input
id="yearInput"
type="number"
placeholder="Enter a year..."

>

<button onclick="travelYear()">
Travel Through Time
</button>

<div id="desc">
Type a year such as 1066, 1492, 1776, 1944, 2025, or 3000.
</div>

<button onclick="resetView()">
Reset View
</button>

</div>

<script>

Cesium.Ion.defaultAccessToken =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiYTFiZTUwNi01YjQzLTRiMWEtOGE4Mi0wYWZiMWZlODIzYTEiLCJpZCI6NDQ4NjM2LCJzdWIiOiJmZ2hqIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6IlRpbWUgRXhwbG9yZXIiLCJpYXQiOjE3ODIzMjcxMzB9.dEQ0gHTtI1KD2QKm3x2qDWap2n-pmzoNbC-EJegkDc0";

const viewer = new Cesium.Viewer("cesiumContainer",{
animation:false,
timeline:false,
baseLayerPicker:false,
geocoder:false,
terrainProvider:undefined
});

viewer.camera.setView({
destination:
Cesium.Cartesian3.fromDegrees(
0,
20,
20000000
)
});

function travelYear(){

const year =
parseInt(
document.getElementById("yearInput").value
);

if(isNaN(year)){
document.getElementById("desc").innerText =
"Please enter a valid year.";
return;
}

let text="";

if(year < -3000){

text =
"Prehistoric Earth. Small groups of humans survive using stone tools and fire.";

}
else if(year < -500){

text =
"Ancient civilizations rise. Egypt, Mesopotamia, and powerful kingdoms dominate the world.";

}
else if(year < 500){

text =
"The Roman Empire influences much of Europe and the Mediterranean world.";

}
else if(year < 1000){

text =
"The early Middle Ages. Kingdoms rise and fall across continents.";

}
else if(year < 1500){

text =
"Castles, knights, trade routes, and powerful rulers shape the medieval world.";

}
else if(year < 1800){

text =
"The Age of Exploration. Oceans connect continents and empires expand.";

}
else if(year < 1900){

text =
"The Industrial Revolution transforms transportation, factories, and daily life.";

}
else if(year < 1914){

text =
"The modern world grows rapidly through science, engineering, and global trade.";

}
else if(year < 1919){

text =
"World War I changes the course of history and reshapes nations.";

}
else if(year < 1939){

text =
"The interwar years bring political change, economic struggles, and new technologies.";

}
else if(year < 1946){

text =
"World War II affects nearly every part of the globe.";

}
else if(year < 1991){

text =
"The Cold War era. Space exploration, computers, and global rivalry define the age.";

}
else if(year < 2020){

text =
"The Internet age connects billions of people around the world.";

}
else if(year < 2050){

text =
"The AI era begins. Technology becomes increasingly integrated into everyday life.";

}
else if(year < 3000){

text =
"The future unfolds with advanced technology, space travel, and unknown discoveries.";

}
else{

text =
"The far future. Humanity's path is impossible to predict.";

}

document.getElementById("title").innerText =
"🕒 Year " + year;

document.getElementById("desc").innerText =
text;

}

function resetView(){

viewer.camera.flyTo({
destination:
Cesium.Cartesian3.fromDegrees(
0,
20,
20000000
),
duration:1.5
});

document.getElementById("title").innerText =
"🌍 Time Explorer";

document.getElementById("desc").innerText =
"Type a year such as 1066, 1492, 1776, 1944, 2025, or 3000.";

}

document
.getElementById("yearInput")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){
travelYear();
}

});
</script>

</body>
</html>
