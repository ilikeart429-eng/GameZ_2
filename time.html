<script>

// 🌍 REQUIRED TOKEN (public demo token)
Cesium.Ion.defaultAccessToken =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo";

// 🌍 INIT VIEWER (SAFE SETTINGS)
const viewer = new Cesium.Viewer("cesiumContainer", {
terrainProvider: undefined,
animation: false,
timeline: false,
baseLayerPicker: false
});

// 🌍 SET DEFAULT VIEW (IMPORTANT)
viewer.camera.setView({
destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000)
});

// 🌍 CLICK HANDLER
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(async function(click) {

const cartesian = viewer.camera.pickEllipsoid(click.position);
if (!cartesian) return;

const cartographic =
Cesium.Cartographic.fromCartesian(cartesian);

const lat = Cesium.Math.toDegrees(cartographic.latitude);
const lon = Cesium.Math.toDegrees(cartographic.longitude);

// smooth zoom
viewer.camera.flyTo({
destination: Cesium.Cartesian3.fromDegrees(lon, lat, 2000000),
duration: 1.5
});

loadInfo(lat, lon);

}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// 📍 INFO
async function loadInfo(lat, lon){

document.getElementById("title").innerText = "Loading...";
document.getElementById("desc").innerText = "";

try{

const geo = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await geo.json();

const place =
data.address.city ||
data.address.town ||
data.address.village ||
data.address.state ||
data.address.country ||
"Unknown";

document.getElementById("title").innerText = place;

// Wikipedia
const wiki = await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/" +
encodeURIComponent(place)
);

const w = await wiki.json();

document.getElementById("desc").innerText =
w.extract || "No description found.";

}catch(err){

document.getElementById("title").innerText =
"Load error";

console.error(err);

}

}

// 🌍 RESET
function resetView(){

viewer.camera.flyTo({
destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000)
});

document.getElementById("title").innerText =
"Click anywhere on Earth";

document.getElementById("desc").innerText =
"";

}

</script>
