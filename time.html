<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Explorer 3D</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
width: 100%;
height: 100%;
margin: 0;
padding: 0;
overflow: hidden;
}

#panel {
position: absolute;
top: 10px;
left: 10px;
width: 320px;
background: rgba(0,0,0,0.8);
color: white;
padding: 12px;
border-radius: 10px;
font-family: Arial;
z-index: 10;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<div id="panel">
<div id="title">🌍 Click anywhere on Earth</div>
<div id="desc"></div>
<button onclick="resetView()">Reset View</button>
</div>

<script>

//////////////////////////////////////////////////////
// 🌍 FIX 1: REQUIRED CESIUM TOKEN (IMPORTANT)
//////////////////////////////////////////////////////
Cesium.Ion.defaultAccessToken =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo";

//////////////////////////////////////////////////////
// 🌍 FIX 2: SAFE VIEWER CONFIG (NO WHITE SCREEN)
//////////////////////////////////////////////////////
const viewer = new Cesium.Viewer("cesiumContainer", {
animation: false,
timeline: false,
baseLayerPicker: false,
geocoder: false,
terrainProvider: undefined
});

//////////////////////////////////////////////////////
// 🌍 DEFAULT VIEW (MUST SET OR YOU SEE WHITE SCREEN)
//////////////////////////////////////////////////////
viewer.camera.setView({
destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000)
});

//////////////////////////////////////////////////////
// 🌍 CLICK HANDLER
//////////////////////////////////////////////////////
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(async function(click){

const cartesian = viewer.camera.pickEllipsoid(click.position);
if(!cartesian) return;

const cartographic =
Cesium.Cartographic.fromCartesian(cartesian);

const lat = Cesium.Math.toDegrees(cartographic.latitude);
const lon = Cesium.Math.toDegrees(cartographic.longitude);

// smooth zoom in
viewer.camera.flyTo({
destination: Cesium.Cartesian3.fromDegrees(lon, lat, 2000000),
duration: 1.5
});

loadPlace(lat, lon);

}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

//////////////////////////////////////////////////////
// 📍 WIKIPEDIA + LOCATION INFO
//////////////////////////////////////////////////////
async function loadPlace(lat, lon){

document.getElementById("title").innerText = "Loading...";
document.getElementById("desc").innerText = "";

try{

// 🌍 Reverse geocode (country/city)
const geo = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);

const data = await geo.json();

const place =
data.address.city ||
data.address.town ||
data.address.village ||
data.address.state ||
data.address.country ||
"Unknown location";

document.getElementById("title").innerText = place;

// 📖 Wikipedia
const wiki = await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/" +
encodeURIComponent(place)
);

const w = await wiki.json();

document.getElementById("desc").innerText =
w.extract || "No description found.";

}catch(err){

document.getElementById("title").innerText = "Error loading data";
console.error(err);

}

}

//////////////////////////////////////////////////////
// 🔄 RESET VIEW
//////////////////////////////////////////////////////
function resetView(){

viewer.camera.flyTo({
destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000),
duration: 1.5
});

document.getElementById("title").innerText =
"🌍 Click anywhere on Earth";

document.getElementById("desc").innerText =
"";

}

</script>

</body>
</html>
