<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Explorer</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

h1{
margin-bottom:10px;
}

#year{
font-size:40px;
margin:10px;
}

input{
width:300px;
margin-bottom:10px;
}

#event{
margin-top:10px;
font-size:16px;
max-width:600px;
text-align:center;
color:#aaa;
}

#space{
position:relative;
width:420px;
height:420px;
margin-top:25px;
border-radius:50%;
background:radial-gradient(circle, #001133, #000);
overflow:hidden;
box-shadow:0 0 40px #0a2a66;
}

.object{
position:absolute;
cursor:pointer;
font-size:24px;
transition:0.2s;
user-select:none;
}

.object:hover{
transform:scale(1.3);
}

#infoBox{
margin-top:15px;
color:#bbb;
max-width:600px;
text-align:center;
min-height:40px;
}
</style>
</head>

<body>

<h1>🕒 Time Explorer</h1>

<div id="year">2000</div>

<input type="range" min="0" max="2026" value="2000" oninput="changeYear(this.value)">

<div id="event">Move the slider to explore time...</div>

<div id="space">

  <div class="object" style="top:50%;left:50%;" onclick="clickObject('earth')">
    🌍
  </div>

  <div class="object" style="top:20%;left:70%;" onclick="clickObject('moon')">
    🌕
  </div>

  <div class="object" style="top:70%;left:30%;" onclick="clickObject('mars')">
    🔴
  </div>

</div>

<div id="infoBox">Click a planet to explore</div>

<script>

let year = 2000;

function changeYear(y){
year = y;
document.getElementById("year").innerText = year;

let eventText = "";

if(year < 1000){
eventText = "Ancient civilizations rise. The world is unknown.";
}
else if(year < 1500){
eventText = "Medieval era. Castles, kingdoms, wars.";
}
else if(year < 1800){
eventText = "Age of exploration and science begins.";
}
else if(year < 1950){
eventText = "Industrial revolution and global wars.";
}
else if(year < 2000){
eventText = "Modern world develops rapidly.";
}
else if(year < 2015){
eventText = "Digital age expands. Internet grows.";
}
else{
eventText = "AI era begins. Everything is connected.";
}

document.getElementById("event").innerText = eventText;
}

function clickObject(name){

let info = "";

if(name === "earth"){
info = "🌍 Earth: Home of humanity. Full of history, life, and civilizations.";
}

if(name === "moon"){
info = "🌕 Moon: Earth's natural satellite. Controls tides and inspires exploration.";
}

if(name === "mars"){
info = "🔴 Mars: The red planet. Future human colonization target.";
}

document.getElementById("infoBox").innerText = info;

}

</script>

</body>
</html>
