<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Explorer 2.0</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:black;
color:white;
overflow:hidden;
}

#universe{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,#001133,#000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:1s;
}

h1{
margin:15px;
}

#space{
position:relative;
width:700px;
height:700px;
}

.object{
position:absolute;
font-size:70px;
cursor:pointer;
transition:0.8s;
user-select:none;
}

.object:hover{
transform:scale(1.2);
}

.zooming{
transform:scale(8);
opacity:0;
}

#explorer{
position:fixed;
inset:0;
background:#050505;
display:none;
overflow-y:auto;
padding:20px;
}

#backBtn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

#photo{
width:100%;
max-width:800px;
border-radius:15px;
display:none;
margin:auto;
}

#title{
text-align:center;
font-size:42px;
margin-top:20px;
}

#desc{
max-width:900px;
margin:20px auto;
line-height:1.6;
color:#ddd;
}

#children{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.child{
background:#151515;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.child:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div id="universe">

<h1>🌌 Time Explorer</h1>

<div id="space">

<div
class="object"
style="left:310px;top:300px;"
onclick="explore('Earth',this)">
🌍
</div>

<div
class="object"
style="left:120px;top:150px;"
onclick="explore('Moon',this)">
🌕
</div>

<div
class="object"
style="left:500px;top:180px;"
onclick="explore('Mars',this)">
🔴
</div>

<div
class="object"
style="left:250px;top:100px;"
onclick="explore('Jupiter',this)">
🟠
</div>

</div>

</div>

<div id="explorer">

<button id="backBtn" onclick="goHome()">
⬅ Back
</button>

<h1 id="title"></h1>

<img id="photo">

<div id="desc"></div>

<div id="children"></div>

</div>

<script>

async function explore(place,el){

if(el){
el.classList.add("zooming");
}

setTimeout(()=>{
document.getElementById("universe").style.display="none";
document.getElementById("explorer").style.display="block";
},700);

loadWiki(place);

}

async function loadWiki(place){

document.getElementById("title").innerText =
"Loading...";

document.getElementById("desc").innerText = "";

document.getElementById("children").innerHTML = "";

try{

const res = await fetch(
"https://en.wikipedia.org/api/rest_v1/page/summary/"
+ encodeURIComponent(place)
);

const data = await res.json();

document.getElementById("title").innerText =
data.title || place;

document.getElementById("desc").innerText =
data.extract || "No description found.";

const photo =
document.getElementById("photo");

if(data.thumbnail){

photo.src =
data.thumbnail.source;

photo.style.display = "block";

}else{

photo.style.display = "none";

}

generateChildren(place);

}catch(err){

document.getElementById("title").innerText =
place;

document.getElementById("desc").innerText =
"Failed to load Wikipedia.";

}

}

function generateChildren(place){

const box =
document.getElementById("children");

let locations = [];

if(place==="Earth"){

locations = [
"Europe",
"Asia",
"Africa",
"North America",
"South America",
"Oceania"
];

}

else if(place==="Europe"){

locations = [
"France",
"Germany",
"Italy",
"Spain",
"United Kingdom"
];

}

else if(place==="France"){

locations = [
"Paris",
"Nice",
"Marseille",
"Lyon",
"Toulouse"
];

}

else if(place==="Nice"){

locations = [
"Promenade des Anglais",
"Castle Hill",
"Old Town Nice"
];

}

locations.forEach(name=>{

const div =
document.createElement("div");

div.className="child";

div.innerText=name;

div.onclick=()=>loadWiki(name);

box.appendChild(div);

});

}

function goHome(){

location.reload();

}

</script>

</body>
</html>
